<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADOW RIFT — Webcam Fighter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap');
:root{--red:#ff2d55;--blue:#00c8ff;--gold:#ffd700;--dark:#05050f;
  --gr:0 0 12px #ff2d55,0 0 28px #ff2d5577;--gb:0 0 12px #00c8ff,0 0 28px #00c8ff77;--gg:0 0 12px #ffd700,0 0 28px #ffd70077}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);font-family:'Rajdhani',sans-serif;color:#fff;overflow:hidden;height:100vh;width:100vw;user-select:none}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.screen.hidden{display:none}
/* TITLE */
#titleScreen{background:radial-gradient(ellipse at 50% 60%,#1a0030,#05050f)}
.logo{font-family:'Orbitron',sans-serif;font-size:clamp(2.5rem,7vw,6rem);font-weight:900;background:linear-gradient(135deg,#ff2d55 30%,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pulse 2s ease-in-out infinite alternate}
@keyframes pulse{from{filter:drop-shadow(0 0 18px #ff2d5555)}to{filter:drop-shadow(0 0 40px #ff2d55cc)}}
.sub{font-family:'Orbitron',sans-serif;font-size:clamp(.55rem,1.3vw,.85rem);letter-spacing:.4em;color:var(--blue);text-shadow:var(--gb);margin:.5rem 0 2rem;text-transform:uppercase}
.btn{background:transparent;border:2px solid var(--red);color:var(--red);font-family:'Orbitron',sans-serif;font-size:1rem;letter-spacing:.18em;padding:.75rem 2.2rem;cursor:pointer;text-transform:uppercase;box-shadow:var(--gr);transition:all .2s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:var(--red);transform:translateX(-101%);transition:transform .3s;z-index:-1}
.btn:hover::before{transform:translateX(0)}.btn:hover{color:#fff}
.hint{margin-top:1.2rem;color:#fff5;font-size:.8rem;letter-spacing:.1em;text-align:center;max-width:420px;line-height:1.6}
/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:flex-start;justify-content:space-between;padding:.9rem 1.1rem .5rem;background:linear-gradient(to bottom,rgba(0,0,0,.78),transparent);pointer-events:none}
.fhud{width:42%}.fhud.right{text-align:right}
.fname{font-family:'Orbitron',sans-serif;font-size:clamp(.55rem,1.3vw,.8rem);letter-spacing:.14em;margin-bottom:.28rem}
.fhud.left .fname{color:var(--blue);text-shadow:var(--gb)}.fhud.right .fname{color:var(--red);text-shadow:var(--gr)}
.htrack{height:15px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.hbar{height:100%;width:100%;border-radius:2px;transition:width .18s ease}
.fhud.left  .hbar{background:linear-gradient(90deg,#00c8ff,#0088ff);box-shadow:var(--gb)}
.fhud.right .hbar{background:linear-gradient(90deg,#ff6600,#ff2d55);box-shadow:var(--gr);float:right}
.fhud.right .htrack{direction:rtl}
.prow{display:flex;gap:3px;margin-top:.3rem}.fhud.right .prow{justify-content:flex-end}
.pip{width:14px;height:5px;background:rgba(255,255,255,.08);border-radius:1px;transition:background .18s}
.pip.on{background:var(--gold);box-shadow:var(--gg)}
.chud{width:16%;display:flex;flex-direction:column;align-items:center;gap:.2rem;padding-top:.05rem}
#rnd{font-family:'Orbitron',sans-serif;font-size:.58rem;letter-spacing:.2em;color:#fff7;text-transform:uppercase}
#tmr{font-family:'Orbitron',sans-serif;font-size:clamp(1.2rem,3vw,2rem);font-weight:900;color:#fff;text-shadow:0 0 18px #fff3}
#tmr.urg{color:var(--red);text-shadow:var(--gr);animation:urg .4s infinite alternate}
@keyframes urg{from{opacity:1}to{opacity:.45}}
/* BANNER */
#banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;pointer-events:none;font-family:'Orbitron',sans-serif;font-size:clamp(1.8rem,6vw,5rem);font-weight:900;text-transform:uppercase;letter-spacing:.06em;opacity:0;text-shadow:0 0 40px currentColor,0 0 80px currentColor}
#banner.show{animation:bAnim .75s forwards}
@keyframes bAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.35)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.9)}}
/* DAMAGE NUMBER */
.dmgNum{position:fixed;font-family:'Orbitron',sans-serif;font-weight:900;pointer-events:none;z-index:25;animation:dmgAnim .9s forwards}
@keyframes dmgAnim{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.6)}}
/* BOTTOM HUD */
#bott{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;align-items:flex-end;justify-content:space-between;padding:.6rem 1.1rem .75rem;background:linear-gradient(to top,rgba(0,0,0,.72),transparent);pointer-events:none}
#pstatus{font-size:.65rem;letter-spacing:.09em;color:#fff5;text-transform:uppercase;margin-bottom:2px}
#paction{font-size:.88rem;font-weight:700;letter-spacing:.1em;color:var(--blue);text-shadow:var(--gb);text-transform:uppercase}
.pip-cam{width:88px;height:66px;border:1px solid rgba(0,200,255,.3);border-radius:3px;overflow:hidden;position:relative;box-shadow:0 0 8px rgba(0,200,255,.18)}
#pipVid{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:.72}
.pipl{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:.48rem;letter-spacing:.14em;color:#00c8ffaa;text-transform:uppercase}

/* ── ON-SCREEN BUTTONS ── */
#ctrlBtns{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:22;display:flex;gap:.5rem;padding:.7rem .9rem .85rem;background:rgba(5,5,20,.6);border-radius:12px 12px 0 0;border:1px solid rgba(255,255,255,.08);border-bottom:none;pointer-events:all}
.cb{width:64px;height:64px;border-radius:12px;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.05em;text-transform:uppercase;font-weight:700;background:rgba(0,0,0,.5);transition:all .12s;-webkit-tap-highlight-color:transparent;touch-action:none}
.cb:active,.cb.pressed{transform:scale(.88)}
.cb svg{display:block}
#cb-left {border-color:#00c8ff66;color:#00c8ff} #cb-left.pressed{background:#00c8ff22;box-shadow:0 0 14px #00c8ff66}
#cb-right{border-color:#00c8ff66;color:#00c8ff} #cb-right.pressed{background:#00c8ff22;box-shadow:0 0 14px #00c8ff66}
#cb-punch{border-color:#ffd70099;color:#ffd700} #cb-punch.pressed{background:#ffd70022;box-shadow:0 0 14px #ffd70066}
#cb-kick {border-color:#ff660099;color:#ff6600} #cb-kick.pressed{background:#ff660022;box-shadow:0 0 14px #ff660066}
#cb-block{border-color:#aaaaff99;color:#aaaaff} #cb-block.pressed{background:#aaaaff22;box-shadow:0 0 14px #aaaaff66}
#cb-super{border-color:#ff2d5599;color:#ff2d55;width:72px} #cb-super.pressed{background:#ff2d5522;box-shadow:0 0 14px #ff2d5566}
#cb-super.locked{opacity:.35;cursor:default}

/* GAME OVER */
#goScreen{background:radial-gradient(ellipse at 50% 40%,#1a0010,#05050f)}
#goTitle{font-family:'Orbitron',sans-serif;font-size:clamp(2rem,6vw,5rem);font-weight:900;margin-bottom:.7rem}
#goSub{font-size:1.05rem;letter-spacing:.22em;color:#fff7;text-transform:uppercase;margin-bottom:2.2rem}
/* CALIB */
#calibDiv{position:fixed;inset:0;z-index:40;background:rgba(5,5,15,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.7rem}
#calibDiv.hidden{display:none}
#calibDiv h2{font-family:'Orbitron',sans-serif;color:var(--gold);text-shadow:var(--gg);font-size:1.3rem}
#calibN{font-family:'Orbitron',sans-serif;font-size:5rem;font-weight:900}
#calibDiv p{color:#fff8;letter-spacing:.08em;font-size:.88rem}
#scanlines{position:fixed;inset:0;z-index:60;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);pointer-events:none;opacity:.4}
#vig{position:fixed;inset:0;z-index:59;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,.65));pointer-events:none}
canvas{position:fixed;inset:0}
#bgC{z-index:1}#gC{z-index:3}#pC{z-index:4}
video{display:none}
</style>
</head>
<body>
<div id="scanlines"></div><div id="vig"></div>

<!-- TITLE -->
<div id="titleScreen" class="screen">
  <div class="logo">Shadow Rift</div>
  <div class="sub">Webcam Fighter Pro</div>
  <button class="btn" id="startBtn">Engage Camera</button>
  <div class="hint">Move your body to fight · Punch · Block · Kick · or use the on-screen buttons below</div>
</div>

<!-- CALIB -->
<div id="calibDiv" class="hidden">
  <h2>Stand Facing Camera</h2>
  <div id="calibN">3</div>
  <p>Full upper body visible · Arms relaxed at sides</p>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen hidden" style="z-index:2;pointer-events:none">
  <video id="webcamVid" playsinline autoplay muted></video>
  <canvas id="bgC"></canvas>
  <canvas id="gC"></canvas>
  <canvas id="pC"></canvas>

  <div id="hud">
    <div class="fhud left">
      <div class="fname">YOU — KAI</div>
      <div class="htrack"><div class="hbar" id="php"></div></div>
      <div class="prow" id="ppips"></div>
    </div>
    <div class="chud">
      <div id="rnd">Round 1</div>
      <div id="tmr">60</div>
    </div>
    <div class="fhud right">
      <div class="fname">SHADOW — AI</div>
      <div class="htrack"><div class="hbar" id="ahp"></div></div>
      <div class="prow" id="apips"></div>
    </div>
  </div>
  <div id="banner"></div>
  <div id="bott">
    <div>
      <div id="pstatus">Initialising…</div>
      <div id="paction">—</div>
    </div>
    <div class="pip-cam">
      <video id="pipVid" autoplay playsinline muted></video>
      <div class="pipl">LIVE</div>
    </div>
  </div>
</div>

<!-- ON-SCREEN BUTTONS (always visible during game) -->
<div id="ctrlBtns" class="hidden">
  <button class="cb" id="cb-left">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
    Move
  </button>
  <button class="cb" id="cb-punch">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 12l-4 4M18 3l-9 9M13 8l3-3M16 11l2-2"/><circle cx="6" cy="18" r="2"/></svg>
    Punch
  </button>
  <button class="cb" id="cb-kick">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 20l6-6M14 4l-4 8 6 4"/></svg>
    Kick
  </button>
  <button class="cb" id="cb-block">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>
    Block
  </button>
  <button class="cb" id="cb-right">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
    Move
  </button>
  <button class="cb locked" id="cb-super">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
    SUPER
  </button>
</div>

<!-- GAME OVER -->
<div id="goScreen" class="screen hidden">
  <div id="goTitle"></div>
  <div id="goSub"></div>
  <button class="btn" id="retryBtn">Play Again</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script>
'use strict';
// ═══════════════════════════════════════════════════════
//  SHADOW RIFT  —  Engine
// ═══════════════════════════════════════════════════════
const bgC=document.getElementById('bgC'),gC=document.getElementById('gC'),pC=document.getElementById('pC');
const bgX=bgC.getContext('2d'),gX=gC.getContext('2d'),pX=pC.getContext('2d');
let W=0,H=0,GY=0;
function resize(){W=window.innerWidth;H=window.innerHeight;GY=H*.72;[bgC,gC,pC].forEach(c=>{c.width=W;c.height=H;});}
window.addEventListener('resize',()=>{resize();if(player&&ai){player.scale=ai.scale=Math.min(W,H)*.00128;}});
resize();
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ── Game State ──────────────────────────────────────────
const GS={running:false,round:1,pWins:0,aWins:0,playerAction:'idle',lastTs:0,poseOK:false};
// Button hold state
const BTN={left:false,right:false,punch:false,kick:false,block:false,super:false};

// ── Particles ────────────────────────────────────────────
const PARTS=[];
function spark(x,y,n,col,o={}){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=(o.spd||5)*(.5+Math.random());PARTS.push({x,y,vx:Math.cos(a)*sp+(o.vx||0),vy:Math.sin(a)*sp+(o.vy||-2),life:1,dec:.022+Math.random()*.03,r:(o.r||4)*(.5+Math.random()),col});}}
function tickParts(dt){pX.clearRect(0,0,W,H);for(let i=PARTS.length-1;i>=0;i--){const p=PARTS[i];p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=.15*dt*60;p.life-=p.dec*dt*60;if(p.life<=0){PARTS.splice(i,1);continue;}pX.save();pX.globalAlpha=p.life;pX.fillStyle=p.col;pX.shadowBlur=8;pX.shadowColor=p.col;pX.beginPath();pX.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);pX.fill();pX.restore();}}

// ── Shockwaves ────────────────────────────────────────────
const WAVES=[];let shakeAmt=0;
function addWave(x,y,col){WAVES.push({x,y,r:0,life:1,col});}
function shake(a){shakeAmt=Math.max(shakeAmt,a*14);}
function drawWaves(){WAVES.forEach((w,i)=>{w.r+=5;w.life-=.07;if(w.life<=0){WAVES.splice(i,1);return;}gX.save();gX.globalAlpha=w.life*.6;gX.strokeStyle=w.col;gX.lineWidth=3;gX.shadowBlur=10;gX.shadowColor=w.col;gX.beginPath();gX.arc(w.x,w.y,w.r,0,Math.PI*2);gX.stroke();gX.restore();});}

// ── Damage numbers ────────────────────────────────────────
function showDmg(x,y,dmg,col){
  const el=document.createElement('div');
  el.className='dmgNum';
  el.textContent='-'+dmg;
  el.style.cssText=`left:${x-18}px;top:${y-60}px;font-size:${dmg>20?'1.8rem':'1.3rem'};color:${col};text-shadow:0 0 10px ${col}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

// ── Background ────────────────────────────────────────────
let bgT=0;
function drawBg(dt){
  bgT+=dt;bgX.clearRect(0,0,W,H);
  const sky=bgX.createLinearGradient(0,0,0,GY);sky.addColorStop(0,'#04040e');sky.addColorStop(.6,'#0c001c');sky.addColorStop(1,'#160030');bgX.fillStyle=sky;bgX.fillRect(0,0,W,H);
  const gnd=bgX.createLinearGradient(0,GY,0,H);gnd.addColorStop(0,'#180038');gnd.addColorStop(1,'#04040e');bgX.fillStyle=gnd;bgX.fillRect(0,GY,W,H-GY);
  bgX.save();bgX.strokeStyle='rgba(120,0,255,.16)';bgX.lineWidth=1;const vx=W/2;
  for(let i=-10;i<=10;i++){bgX.beginPath();bgX.moveTo(vx+i*90,GY);bgX.lineTo(vx+(i*90)*6,GY+H);bgX.stroke();}
  for(let j=1;j<10;j++){const t=j/10,y=GY+t*(H-GY)*1.4;bgX.globalAlpha=(1-t)*.6;bgX.beginPath();bgX.moveTo(0,y);bgX.lineTo(W,y);bgX.stroke();}
  bgX.restore();
  const ag=bgX.createRadialGradient(W/2,GY,0,W/2,GY,W*.44);ag.addColorStop(0,'rgba(90,0,180,.14)');ag.addColorStop(1,'transparent');bgX.fillStyle=ag;bgX.beginPath();bgX.ellipse(W/2,GY,W*.44,55,0,0,Math.PI*2);bgX.fill();
  bgX.save();for(let i=0;i<10;i++){const ft=((bgT*.15+i*.9)%1),fx=W*(.08+i*.09)+Math.sin(bgT*.4+i)*24,fy=GY*(1-ft)*.92;bgX.globalAlpha=(ft<.1?ft/.1:ft>.8?(1-ft)/.2:1)*.22;bgX.fillStyle=i%2?'#00c8ff':'#ff2d55';bgX.shadowBlur=6;bgX.shadowColor=bgX.fillStyle;bgX.beginPath();bgX.arc(fx,fy,1.5,0,Math.PI*2);bgX.fill();}bgX.restore();
}

// ── Rounded rect ──────────────────────────────────────────
function rr(cx,x,y,w,h,r,fill){if(fill)cx.fillStyle=fill;cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();cx.fill();}

// ══════════════════════════════════════════════
//  FIGHTER BASE
// ══════════════════════════════════════════════
class Fighter{
  constructor(cfg){
    this.x=cfg.x||0; this.y=GY; this.vx=0; this.vy=0;
    this.hp=100; this.maxHp=100;
    this.power=0; this.maxPower=5;
    this.facing=cfg.facing||1;
    this.state='idle'; this.stTimer=0; this.aTime=0;
    this.invTimer=0;        // invincibility frames after being hit
    this.atkCooldown=0;     // FIX: prevents attack spam & multi-hit per swing
    this.hitLanded=false;   // FIX: only deal damage once per attack animation
    this.combo=0; this.comboT=0;
    this.scale=Math.min(W,H)*.00128;
    this.name=cfg.name||'';
  }
  setState(s,dur=0){
    if(this.state===s&&s!=='idle')return; // don't restart same state
    this.state=s; this.stTimer=dur; this.aTime=0;
    this.hitLanded=false; // FIX: reset hit flag on new state
  }
  get attacking(){return this.state==='attack'||this.state==='special';}
  tick(dt,opp){
    this.stTimer=Math.max(0,this.stTimer-dt);
    this.invTimer=Math.max(0,this.invTimer-dt);
    this.atkCooldown=Math.max(0,this.atkCooldown-dt);
    this.comboT=Math.max(0,this.comboT-dt);
    if(this.comboT===0)this.combo=0;
    this.aTime+=dt;
    // auto-return to idle when state expires
    if(this.stTimer===0&&!['idle','walk','victory','dead'].includes(this.state))this.setState('idle');
    // gravity
    if(this.y<GY){this.vy+=900*dt;this.y+=this.vy*dt;if(this.y>=GY){this.y=GY;this.vy=0;if(this.state==='knockdown')this.setState('idle',.4);}}
    this.x+=this.vx*dt;
    const mar=W*.055;this.x=Math.max(mar,Math.min(W-mar,this.x));
    if(this.state==='idle'||this.state==='walk')this.facing=opp.x>this.x?1:-1;
    if(this.state!=='walk')this.vx*=.8; // friction
  }
  // FIX: takeHit is guarded by invTimer AND hitLanded on attacker side
  takeHit(dmg,type,attackerRef){
    if(this.invTimer>0||this.state==='dead')return false;
    if(attackerRef&&attackerRef.hitLanded)return false; // FIX: one hit per swing
    let actualDmg=dmg;
    let blocked=false;
    if(this.state==='block'&&type!=='special'){
      actualDmg=Math.max(1,Math.floor(dmg*.1)); // 90% damage reduction when blocking
      blocked=true;
      spark(this.x,this.y-this.H*.5,6,'#aaaaff',{spd:3});
    }
    this.hp=Math.max(0,this.hp-actualDmg);
    this.invTimer=.5; // FIX: longer invincibility window (was .35)
    if(attackerRef)attackerRef.hitLanded=true; // FIX: mark hit used
    if(!blocked&&actualDmg>4){
      this.setState(type==='special'?'knockdown':'hurt',type==='special'?.65:.22);
      if(type==='special'){this.vx=this.facing>0?-260:260;this.vy=-170;}
    }
    return {dmg:actualDmg,blocked};
  }
  get H(){return this.scale*220;}
  draw(){
    const blink=this.invTimer>0&&Math.floor(Date.now()/65)%2===0;if(blink)return;
    gX.save();gX.translate(this.x,this.y);gX.scale(this.facing*this.scale,this.scale);
    this.drawBody();gX.restore();
    gX.save();gX.globalAlpha=.22;gX.fillStyle='#000';gX.beginPath();gX.ellipse(this.x,this.y+3,36*this.scale,6*this.scale,0,0,Math.PI*2);gX.fill();gX.restore();
  }
  drawBody(){}
}

// ══════════════════════════════════════════════
//  PLAYER — KAI
// ══════════════════════════════════════════════
class Kai extends Fighter{
  drawBody(){

    if(st==='hurt'){bL=28;aE=-12;}

//  AI — SHADOW
// ══════════════════════════════════════════════
class Shadow extends Fighter{
  constructor(cfg){
    super(cfg);
    this.aiT=0;       // time until next AI decision
    this.aiAtkCD=0;   // FIX: dedicated attack cooldown for AI (prevents spam)
  }
  aiTick(dt,player){
    this.aiT-=dt; this.aiAtkCD-=dt;
    if(['hurt','knockdown','dead'].includes(this.state))return;
    const dist=Math.abs(this.x-player.x);
    const hR=this.hp/this.maxHp;

    // React to player attacking — chance to block
    if(player.attacking&&dist<200&&this.aiAtkCD<=0&&Math.random()<.4*dt*60){
      this.setState('block',.45);return;
    }

    if(this.aiT<=0){
      const r=Math.random();
      if(dist>280){
        // Advance toward player
        this.vx=this.x>player.x?-160:160;
        this.setState('walk',.5);
        this.aiT=.5;
      } else if(dist<=200&&this.aiAtkCD<=0){
        // In range — decide attack or block
        this.vx=0;
        if(hR<.3&&this.power>=this.maxPower){
          // Desperate super move
          this.setState('special',.62);
          this.aiAtkCD=3.0; // FIX: long cooldown after special
        } else if(r<.55){
          this.setState('attack',.38);
          this.aiAtkCD=1.1; // FIX: consistent cooldown between attacks
        } else if(r<.75){
          this.setState('block',.4);
          this.aiAtkCD=.6;
        }
        // else idle/wait
        this.aiT=.6+Math.random()*.5;
      } else if(dist>200&&dist<300&&r<.25){
        // Slight retreat
        this.vx=this.x>player.x?100:-100;
        this.setState('walk',.3);this.aiT=.35;
      } else {
        this.aiT=.25+Math.random()*.2;
      }
    }
    if(this.state!=='walk')this.vx=0;
  }
  drawBody(){
    const cx=gX,t=this.aTime,st=this.state;
    const bob=st==='idle'?Math.sin(t*3.8)*4:0;
    let aE=0,lE=0,bL=0;
    if(st==='attack'){const p=Math.min(1,t/.28);aE=Math.sin(p*Math.PI)*60;lE=Math.sin(p*Math.PI)*20;bL=Math.sin(p*Math.PI)*12;}
    if(st==='special'){aE=90;lE=32;bL=24;}
    if(st==='block'){aE=-28;bL=-14;}
    if(st==='hurt'){bL=30;aE=-14;}
    cx.save();cx.translate(bL,bob-200);
    // Torso
    const tg=cx.createLinearGradient(-26,-55,26,55);tg.addColorStop(0,'#1f0030');tg.addColorStop(1,'#090012');rr(cx,-23,-55,46,85,9,tg);
    const ag=cx.createLinearGradient(-16,-44,16,12);ag.addColorStop(0,'#370056');ag.addColorStop(1,'#1f0030');rr(cx,-16,-44,32,50,6,ag);
    cx.fillStyle='#ff2d55';cx.shadowBlur=16;cx.shadowColor='#ff2d55';cx.beginPath();cx.arc(0,-22,7,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
    // Head
    cx.save();cx.translate(0,-80);
    cx.fillStyle='#0e0020';cx.shadowBlur=22;cx.shadowColor='#6600ff';cx.beginPath();cx.moveTo(0,-62);cx.bezierCurveTo(-32,-44,-30,14,-22,22);cx.bezierCurveTo(-5,32,5,32,22,22);cx.bezierCurveTo(30,14,32,-44,0,-62);cx.closePath();cx.fill();cx.shadowBlur=0;
    const ff=cx.createLinearGradient(-16,-32,16,14);ff.addColorStop(0,'#1c0030');ff.addColorStop(1,'#0a0018');rr(cx,-16,-32,32,46,7,ff);
    cx.fillStyle='#ff2d55';cx.shadowBlur=16;cx.shadowColor='#ff2d55';cx.beginPath();cx.ellipse(-8,-12,6,5,0,0,Math.PI*2);cx.fill();cx.beginPath();cx.ellipse(8,-12,6,5,0,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
    cx.strokeStyle='#ff000099';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(-2,-20);cx.lineTo(5,3);cx.stroke();
    cx.restore();
    // Arms
    cx.save();cx.translate(24,-24);cx.rotate((-36+aE)*Math.PI/180);rr(cx,-7,0,14,38,5,'#1f0030');cx.translate(0,40);cx.rotate((-22+aE*.4)*Math.PI/180);rr(cx,-6,0,12,32,5,'#160024');cx.translate(0,33);cx.fillStyle=aE>30?'#ff2d55':'#2a0040';if(aE>30){cx.shadowBlur=22;cx.shadowColor='#ff2d55';}rr(cx,-8,-5,16,16,5);cx.shadowBlur=0;cx.restore();
    cx.save();cx.translate(-24,-24);cx.rotate((26-aE*.25)*Math.PI/180);rr(cx,-7,0,14,38,5,'#1f0030');cx.translate(0,40);cx.rotate(20*Math.PI/180);rr(cx,-6,0,12,32,5,'#160024');cx.translate(0,33);cx.fillStyle='#2a0040';cx.shadowBlur=0;rr(cx,-8,-5,16,16,5);cx.restore();
    // Legs
    cx.save();cx.translate(12,30);cx.rotate((14+lE)*Math.PI/180);rr(cx,-9,0,18,44,6,'#170020');cx.translate(0,46);cx.rotate(-9*Math.PI/180);rr(cx,-8,0,16,38,6,'#100018');cx.translate(-3,36);rr(cx,-8,-5,24,14,4,'#0a0010');cx.restore();
    cx.save();cx.translate(-12,30);cx.rotate((-14-lE*.4)*Math.PI/180);rr(cx,-9,0,18,44,6,'#170020');cx.translate(0,46);cx.rotate(9*Math.PI/180);rr(cx,-8,0,16,38,6,'#100018');cx.translate(-5,36);rr(cx,-8,-5,24,14,4,'#0a0010');cx.restore();
    // Aura
    cx.save();cx.globalAlpha=.18+Math.sin(t*4)*.08;cx.fillStyle='#7700ff';cx.shadowBlur=40;cx.shadowColor='#7700ff';cx.beginPath();cx.ellipse(0,-90,52,95,0,0,Math.PI*2);cx.fill();cx.restore();
    cx.restore();
  }
}

let player,ai;
function initFighters(){
  player=new Kai({x:W*.28,facing:1,name:'Kai'});
  ai=new Shadow({x:W*.72,facing:-1,name:'Shadow'});
  updateHUD();
}

// FIX: hit range scaled down, Y tolerance adjusted, one-hit-per-swing enforced
function checkHits(){
  const hr=W*.105; // tighter range (was .13)
  const yTol=100;
  // player → ai
  if(player.attacking&&!player.hitLanded&&Math.abs(player.x-ai.x)<hr&&Math.abs(player.y-ai.y)<yTol){
    const dmg=player.state==='special'?24:12;
    const res=ai.takeHit(dmg,player.state,player);
    if(res){
      spark(ai.x,ai.y-ai.H*.45,player.state==='special'?28:12,'#ffd700',{spd:player.state==='special'?7:4});
      addWave(ai.x,ai.y-ai.H*.45,player.state==='special'?'#ff2d55':'#ffd700');
      shake(player.state==='special'?.48:.18);
      showDmg(ai.x,ai.y-ai.H*.7,res.dmg,res.blocked?'#aaaaff':'#ffd700');
      player.combo++;player.comboT=1.4;
      if(player.state==='special')player.power=0;
      else player.power=Math.min(player.maxPower,player.power+1);
      if(player.combo>=2)flashCombo(player.combo);
    }
  }
  // ai → player
  if(ai.attacking&&!ai.hitLanded&&Math.abs(ai.x-player.x)<hr&&Math.abs(ai.y-player.y)<yTol){
    const dmg=ai.state==='special'?20:9;  // FIX: AI damage slightly lower than player
    const res=player.takeHit(dmg,ai.state,ai);
    if(res){
      spark(player.x,player.y-player.H*.45,ai.state==='special'?25:10,'#ff2d55',{spd:4});
      addWave(player.x,player.y-player.H*.45,'#ff2d55');
      shake(.18);
      showDmg(player.x,player.y-player.H*.7,res.dmg,res.blocked?'#aaaaff':'#ff2d55');
      if(ai.state==='special')ai.power=0;
      else ai.power=Math.min(ai.maxPower,ai.power+1);
    }
  }
}

// Combo display
let comboFlash=null;
function flashCombo(n){comboFlash={n,t:1.2};}
function drawCombo(dt){
  if(!comboFlash)return;comboFlash.t-=dt;if(comboFlash.t<=0){comboFlash=null;return;}
  gX.save();gX.globalAlpha=Math.min(1,comboFlash.t*1.5);
  gX.font=`bold ${Math.min(46+comboFlash.n*3,70)}px Orbitron,sans-serif`;
  gX.fillStyle='#ffd700';gX.shadowBlur=22;gX.shadowColor='#ffd700';gX.textAlign='center';
  gX.fillText(comboFlash.n+'x COMBO!',player.x,player.y-player.H-12);gX.restore();
}

// HUD
function updateHUD(){
  document.getElementById('php').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('ahp').style.width=(ai.hp/ai.maxHp*100)+'%';
  setPips('ppips',player.power,player.maxPower);
  setPips('apips',ai.power,ai.maxPower);
  // Super button locked/unlocked
  const sb=document.getElementById('cb-super');
  if(player.power>=player.maxPower){sb.classList.remove('locked');}
  else{sb.classList.add('locked');}
}
function setPips(id,v,m){const el=document.getElementById(id);el.innerHTML='';for(let i=0;i<m;i++){const d=document.createElement('div');d.className='pip'+(i<v?' on':'');el.appendChild(d);}}

// Banner
let banTO=null;
function banner(txt,col='#fff'){
  const el=document.getElementById('banner');el.textContent=txt;el.style.color=col;
  el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
  clearTimeout(banTO);banTO=setTimeout(()=>el.classList.remove('show'),750);
}

// Timer
let roundTimer=60,timerInt=null;
function startTimer(){
  clearInterval(timerInt);roundTimer=60;
  timerInt=setInterval(()=>{
    roundTimer--;
    const el=document.getElementById('tmr');el.textContent=roundTimer;el.classList.toggle('urg',roundTimer<=10);
    if(roundTimer<=0){clearInterval(timerInt);timeOut();}
  },1000);
}
function timeOut(){if(player.hp>ai.hp)endRound('player');else if(ai.hp>player.hp)endRound('ai');else endRound('draw');}

function checkRoundEnd(){
  if(!GS.running)return;
  if(player.hp<=0)endRound('ai');else if(ai.hp<=0)endRound('player');
}

function endRound(who){
  GS.running=false;clearInterval(timerInt);
  if(who==='player'){GS.pWins++;banner('YOU WIN!','#00c8ff');player.setState('victory');}
  else if(who==='ai'){GS.aWins++;banner('SHADOW WINS!','#ff2d55');ai.setState('victory');}
  else banner('DRAW','#ffd700');
  setTimeout(()=>{if(GS.pWins>=2||GS.aWins>=2||GS.round>=3)showGameOver();else{GS.round++;nextRound();}},2600);
}
function nextRound(){
  document.getElementById('rnd').textContent='Round '+GS.round;
  initFighters();banner('ROUND '+GS.round,'#ffd700');
  setTimeout(()=>{banner('FIGHT!','#fff');GS.running=true;startTimer();},1600);
}
function showGameOver(){
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('ctrlBtns').classList.add('hidden');
  document.getElementById('goScreen').classList.remove('hidden');
  const t=document.getElementById('goTitle'),s=document.getElementById('goSub');
  if(GS.pWins>GS.aWins){t.textContent='VICTORY';t.style.color='#00c8ff';t.style.textShadow='0 0 40px #00c8ff';s.textContent='Shadow has been defeated';}
  else if(GS.aWins>GS.pWins){t.textContent='DEFEATED';t.style.color='#ff2d55';t.style.textShadow='0 0 40px #ff2d55';s.textContent='Darkness prevails…';}
  else{t.textContent='DRAW';t.style.color='#ffd700';s.textContent='Neither fighter prevails';}
}
function resetGame(){
  GS.pWins=0;GS.aWins=0;GS.round=1;
  document.getElementById('goScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  document.getElementById('ctrlBtns').classList.remove('hidden');
  nextRound();
}

// ══════════════════════════════════════════════
//  ON-SCREEN BUTTONS
// ══════════════════════════════════════════════
function setupButtons(){
  function hold(id,action,start,end){
    const el=document.getElementById(id);
    const on=e=>{e.preventDefault();BTN[action]=true;el.classList.add('pressed');if(start)start();};
    const off=e=>{e.preventDefault();BTN[action]=false;el.classList.remove('pressed');if(end)end();};
    el.addEventListener('pointerdown',on);
    el.addEventListener('pointerup',off);
    el.addEventListener('pointerleave',off);
    el.addEventListener('touchstart',on,{passive:false});
    el.addEventListener('touchend',off,{passive:false});
  }
  function tap(id,action){
    const el=document.getElementById(id);
    const fn=e=>{e.preventDefault();if(!GS.running)return;triggerAction(action);el.classList.add('pressed');setTimeout(()=>el.classList.remove('pressed'),150);};
    el.addEventListener('pointerdown',fn);
    el.addEventListener('touchstart',fn,{passive:false});
  }
  hold('cb-left','left');
  hold('cb-right','right');
  tap('cb-punch','punch');
  tap('cb-kick','kick');
  hold('cb-block','block');
  tap('cb-super','super');
}

function triggerAction(action){
  if(!player||!GS.running||['hurt','knockdown','dead'].includes(player.state))return;
  if(action==='punch'&&player.atkCooldown<=0){player.setState('attack',.3);player.atkCooldown=.55;}
  if(action==='kick'&&player.atkCooldown<=0){player.setState('attack',.3);player.atkCooldown=.55;}
  if(action==='super'&&player.power>=player.maxPower&&player.atkCooldown<=0){
    player.setState('special',.62);player.atkCooldown=1.2;
    banner('SUPER MOVE!','#ffd700');spark(player.x,player.y-player.H*.5,40,'#00c8ff',{spd:6});
  }
}

function applyButtonMovement(){
  if(!player||!GS.running)return;
  if(BTN.left) player.x-=5;
  if(BTN.right)player.x+=5;
  if(BTN.block&&!['attack','special','hurt','knockdown'].includes(player.state)){
    if(player.state!=='block')player.setState('block',.12);
  }
}

// ══════════════════════════════════════════════
//  POSE DETECTION — fully robust
// ══════════════════════════════════════════════
const SM2={};
function sm(k,v,a=.3){SM2[k]=SM2[k]!==undefined?SM2[k]*(1-a)+v*a:v;return SM2[k];}
let baseShldrY=null;
let poseActive=false;
let noDetectFrames=0; // count consecutive missed frames

// ── Visual skeleton overlay on pip canvas corner ──────────
// We draw a tiny skeleton indicator in bottom-right pip area
// using the raw landmark data so user can see if pose is tracked

function onPose(res){
  const statusEl=document.getElementById('pstatus');
  const actionEl=document.getElementById('paction');

  if(!res.poseLandmarks||res.poseLandmarks.length<25){
    noDetectFrames++;
    if(noDetectFrames>10){
      statusEl.textContent='⚠ Move into frame';
      actionEl.textContent='—';
      GS.playerAction='idle';
    }
    return;
  }
  noDetectFrames=0;
  poseActive=true;
  statusEl.textContent='📷 Pose Active ✓';

  const lm=res.poseLandmarks;

  // Key landmarks (all 0–1 normalised, Y increases downward)
  const nose   = lm[0];
  const lShldr = lm[11], rShldr = lm[12];
  const lElbow = lm[13], rElbow = lm[14];
  const lWrist = lm[15], rWrist = lm[16];
  const lHip   = lm[23], rHip   = lm[24];
  const lKnee  = lm[25], rKnee  = lm[26];

  // Smoothed values
  const nY   = sm('nY',  nose.y);
  const lSY  = sm('lSY', lShldr.y), rSY = sm('rSY', rShldr.y);
  const lSX  = sm('lSX', lShldr.x), rSX = sm('rSX', rShldr.x);
  const lWY  = sm('lWY', lWrist.y), rWY = sm('rWY', rWrist.y);
  const lWX  = sm('lWX', lWrist.x), rWX = sm('rWX', rWrist.x);
  const lEY  = sm('lEY', lElbow.y), rEY = sm('rEY', rElbow.y);
  const hipY = sm('hY',  (lHip.y+rHip.y)/2);
  const lKY  = sm('lKY', lKnee.y),  rKY = sm('rKY', rKnee.y);
  const shldrMidY = (lSY+rSY)/2;
  const shldrMidX = (lSX+rSX)/2;

  // Set baseline on first good frame
  if(baseShldrY===null){
    baseShldrY=shldrMidY;
    statusEl.textContent='✅ Calibrated!';
  }

  // ── ACTION DETECTION ──────────────────────────────────
  // NOTE: webcam feed is mirrored so left/right in video = right/left landmarks
  // We treat EITHER wrist punching (simpler, more reliable)

  // PUNCH: any wrist raised clearly above its own shoulder
  // threshold .08 = wrist must be 8% of frame height above shoulder
  const lPunch = lWY < lSY - .08;   // left wrist above left shoulder
  const rPunch = rWY < rSY - .08;   // right wrist above right shoulder

  // BLOCK: BOTH wrists above mid-shoulder level (guard position)
  const bothWristsUp = lWY < shldrMidY - .05 && rWY < shldrMidY - .05;
  // Distinguish block from punch: both arms up simultaneously
  const isBlock = bothWristsUp && lPunch && rPunch;

  // KICK: knee raised above hip level
  const lKick = lKY < hipY - .08;
  const rKick = rKY < hipY - .08;
  const isKick = lKick || rKick;

  // SUPER: both wrists fully above nose (arms raised overhead)
  const isSuper = lWY < nY - .05 && rWY < nY - .05 && player && player.power >= player.maxPower;

  // DUCK: player crouches — nose drops below baseline
  const isDuck = nY > baseShldrY + .14;

  // Priority order
  let action = 'idle';
  if(isSuper)       action = 'special';
  else if(isBlock)  action = 'block';
  else if(isDuck)   action = 'duck';
  else if(isKick)   action = 'kick';
  else if(lPunch || rPunch) action = 'punch';

  actionEl.textContent = action.toUpperCase();
  GS.playerAction = action;
  GS.poseOK = true;

  // ── MOVE PLAYER BY BODY POSITION ──────────────────────
  if(player){
    const targetX = W * .1 + (1 - shldrMidX) * (W * .78);
    player.x += (targetX - player.x) * .14;
  }

  // ── SKELETON DEBUG in PiP box ─────────────────────────
  drawSkeletonPip(lm, action);
}

function drawSkeletonPip(lm, action){
  const pipEl = document.getElementById('pipVid');
  if(!pipEl) return;
  const rect = pipEl.getBoundingClientRect();
  if(!rect.width) return;
  const ox=rect.left, oy=rect.top, pw=rect.width, ph=rect.height;

  pX.save();
  pX.clearRect(ox-2, oy-2, pw+4, ph+4);

  const col = action==='punch'?'#ffd700':action==='block'?'#aaaaff':action==='kick'?'#ff6600':action==='special'?'#ff2d55':'#00ff88';
  pX.strokeStyle=col; pX.lineWidth=1.5; pX.shadowBlur=4; pX.shadowColor=col;

  const connections=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28],[0,11],[0,12]];
  connections.forEach(([a,b])=>{
    if(!lm[a]||!lm[b])return;
    pX.beginPath();
    pX.moveTo(ox+(1-lm[a].x)*pw, oy+lm[a].y*ph);
    pX.lineTo(ox+(1-lm[b].x)*pw, oy+lm[b].y*ph);
    pX.stroke();
  });

  [0,11,12,13,14,15,16,23,24,25,26].forEach(i=>{
    if(!lm[i])return;
    pX.fillStyle=col;
    pX.beginPath();
    pX.arc(ox+(1-lm[i].x)*pw, oy+lm[i].y*ph, 2, 0, Math.PI*2);
    pX.fill();
  });
  pX.restore();
}

function applyPoseAction(){
  if(!GS.running||!player||player.state==='dead')return;
  const a=GS.playerAction;
  // Don't interrupt active attack/special/hurt states
  if(['attack','special','hurt','knockdown'].includes(player.state))return;

  if(a==='special'&&player.power>=player.maxPower&&player.atkCooldown<=0){
    player.setState('special',.62); player.atkCooldown=1.2;
    banner('SUPER MOVE!','#ffd700');
    spark(player.x, player.y-player.H*.5, 40,'#00c8ff',{spd:6});
  } else if((a==='punch'||a==='kick')&&player.atkCooldown<=0){
    player.setState('attack',.3); player.atkCooldown=.55;
  } else if(a==='block'){
    if(player.state!=='block') player.setState('block',.12);
  } else {
    // return to idle only if not already idle/walk
    if(!['idle','walk'].includes(player.state)) player.setState('idle');
  }
}

// ── Camera initialisation — decoupled from getUserMedia ───
// We use requestAnimationFrame to feed frames to pose instead of
// Camera utility, which has cross-browser issues.
let poseModel = null;
let rafPoseId = null;

async function initPose(videoEl){
  const statusEl = document.getElementById('pstatus');
  statusEl.textContent = '⏳ Loading pose model…';

  try{
    // Check MediaPipe Pose is available
    if(typeof Pose === 'undefined') throw new Error('Pose class not found');

    poseModel = new Pose({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`
    });

    poseModel.setOptions({
      modelComplexity: 1,          // 0=lite 1=full 2=heavy — 1 is best balance
      smoothLandmarks: true,
      enableSegmentation: false,
      smoothSegmentation: false,
      minDetectionConfidence: 0.45,
      minTrackingConfidence: 0.45,
    });

    poseModel.onResults(onPose);

    // Initialize the model (loads WASM + weights)
    statusEl.textContent = '⏳ Initialising model…';
    await poseModel.initialize();
    statusEl.textContent = '⏳ Warming up…';

    // Send one dummy frame so WASM is fully ready
    await poseModel.send({image: videoEl});
    statusEl.textContent = '📷 Pose Ready — stand in frame';

    // ── Use rAF loop to feed frames — most reliable cross-browser ──
    let lastPoseTime = 0;
    async function poseLoop(ts){
      // Run pose at ~20fps to not block game loop (game runs at 60fps)
      if(ts - lastPoseTime > 50 && videoEl.readyState >= 2){
        lastPoseTime = ts;
        try{ await poseModel.send({image: videoEl}); }
        catch(e){ /* ignore frame errors */ }
      }
      rafPoseId = requestAnimationFrame(poseLoop);
    }
    rafPoseId = requestAnimationFrame(poseLoop);

  } catch(e){
    console.warn('MediaPipe Pose failed:', e);
    statusEl.textContent = '⚠ Pose unavailable — use buttons/keyboard';
    // Still allow buttons and keyboard
    setupKeyboard();
  }
}

function setupKeyboard(){
  // Also always set up keyboard as secondary input
  const keys={};
  window.addEventListener('keydown',e=>{
    keys[e.code]=true;
    // Don't override pose if pose is active
    if(poseActive) return;
    applyKeys(keys);
  });
  window.addEventListener('keyup',e=>{
    keys[e.code]=false;
    if(poseActive) return;
    applyKeys(keys);
  });
  function applyKeys(k){
    if(player){
      if(k['KeyA']) player.x -= 6;
      if(k['KeyD']) player.x += 6;
    }
    let a='idle';
    if(k['KeyZ']) a='punch';
    if(k['KeyX']) a='block';
    if(k['KeyS']) a='kick';
    if(k['Space']&&player&&player.power>=player.maxPower) a='special';
    if(a!=='idle'||!poseActive){
      GS.playerAction=a;
      if(!poseActive) document.getElementById('paction').textContent=a.toUpperCase()+' [KB]';
    }
  }
  // Always register, even if pose works — keyboard is fallback
}

// ══════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════
function loop(ts){
  const dt=Math.min(.05,(ts-GS.lastTs)/1000);GS.lastTs=ts;
  shakeAmt*=.82;
  const sx=shakeAmt*(Math.random()-.5),sy=shakeAmt*(Math.random()-.5);
  gX.setTransform(1,0,0,1,sx,sy);
  gX.clearRect(-100,-100,W+200,H+200);
  drawBg(dt);
  if(player&&ai){
    applyButtonMovement();
    applyPoseAction();
    ai.aiTick(dt,player);
    player.tick(dt,ai);ai.tick(dt,player);
    if(GS.running){checkHits();checkRoundEnd();}
    updateHUD();
    player.draw();ai.draw();
    drawWaves();drawCombo(dt);
  }
  gX.setTransform(1,0,0,1,0,0);
  tickParts(dt);
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════
async function startGame(){
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  document.getElementById('ctrlBtns').classList.remove('hidden');
  resize(); initFighters(); setupButtons(); setupKeyboard();

  // Start game loop immediately so screen isn't frozen during camera init
  requestAnimationFrame(ts=>{ GS.lastTs=ts; requestAnimationFrame(loop); });

  const statusEl = document.getElementById('pstatus');

  // ── Step 1: Get camera permission ──
  let videoEl = null;
  try{
    statusEl.textContent = '🎥 Requesting camera…';
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ width:{ideal:640}, height:{ideal:480}, facingMode:'user' },
      audio: false
    });

    videoEl = document.getElementById('webcamVid');
    const pipVid = document.getElementById('pipVid');

    // Attach stream to both video elements
    videoEl.srcObject = stream;
    pipVid.srcObject  = stream;

    // Wait for video to be ready
    await new Promise((resolve, reject)=>{
      videoEl.onloadedmetadata = ()=>{ videoEl.play().then(resolve).catch(reject); };
      videoEl.onerror = reject;
      setTimeout(reject, 8000); // 8s timeout
    });

    // Also play pip (non-blocking)
    pipVid.play().catch(()=>{});
    statusEl.textContent = '✅ Camera connected';

  } catch(e){
    const msg = e.name === 'NotAllowedError'
      ? '🚫 Camera blocked — allow access & refresh'
      : e.name === 'NotFoundError'
      ? '🚫 No camera found'
      : '⚠ Camera error — using buttons/keyboard';
    statusEl.textContent = msg;
    console.warn('Camera error:', e.name, e.message);
    // Start game without camera after short delay
    setTimeout(startRound, 500);
    return;
  }

  // ── Step 2: Calibration countdown ──
  const cal = document.getElementById('calibDiv');
  const nn  = document.getElementById('calibN');
  cal.classList.remove('hidden');
  for(let i=3; i>=1; i--){ nn.textContent=i; await sleep(1000); }
  cal.classList.add('hidden');

  // ── Step 3: Init pose detection (non-blocking — game starts regardless) ──
  initPose(videoEl); // intentionally NOT awaited — pose loads in background

  startRound();
}

function startRound(){
  banner('ROUND 1','#ffd700');
  setTimeout(()=>{ banner('FIGHT!','#fff'); GS.running=true; startTimer(); }, 1600);
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',resetGame);

// Title bg
(function tl(ts=0){requestAnimationFrame(ts2=>{drawBg((ts2-ts)/1000);tl(ts2);});})();
</script>
